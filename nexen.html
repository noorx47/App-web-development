<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="nexen.css">
    <title>Used & Refurbished Products</title>
 

</head>

<body>
    <nav class="navbar">
        <div class="logo">Nexen</div>
        <ul class="nav_lists">
            <li><a href="nexen.html">Products</a></li>
            <li><a href="add-product.html">Sell</a></li>
            <li><a href="#">About</a></li>
            <li><a href="orders.html">Orders</a></li>
        </ul>
        <div class="nav-cta">
            <div class="sr_bar">
                <input type="text" id="searchInput" placeholder="Search" class="nav-search_input">
            </div>
           <a href="checkout.html" class="btn-wishlist" id="checkoutBtn">Checkout <span id="cartCount" class="cart_badge">0</span></a>
        </div>
    </nav>

    <main class="product_page">
        <section class="products_header">
            <div class="container">
                <h1 class="title_head">Made for a second life</h1>
                <div class="filter_wrapper">
                    <div class="categories_tab">
                        <button class="tab_active" data-category="all">All</button>
                        <button class="tab" data-category="laptops">Laptops</button>
                        <button class="tab" data-category="smartphones">Smartphones</button>
                        <button class="tab" data-category="entertainment">Entertainment</button>
                        <button class="tab" data-category="wearables">Watches</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="product-section">
            <div class="container">
                <div class="products-box" id="productContainer">
                    <!-- Products loaded by nexen.js -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Tested. Trusted. Yours.</p>
        </div>
    </footer>

    <div class="modal_overlay" id="productModal">
  <div class="modal_content">
    <button class="modal_close" onclick="closeModal()">✕</button>
    <div class="modal_body">
      <div class="modal_image_wrap">
        <img id="modal_image" src="" alt="Product Image">
      </div>
      <div class="modal_details">
        <span class="modal_category" id="modal_category"></span>
        <h2 class="modal_name" id="modal_name"></h2>
        <p class="modal_description" id="modal_description"></p>
        <div class="modal_meta">
          <span class="product_rating" id="modal_condition"></span>
          <span class="product-price" id="modal_price"></span>
        </div>
        <button class="btn_atc" id="modal_atc">Add to Bag</button>
      </div>
    </div>
  </div>
</div>
    <script src="nexen.js"></script>
</body>

</html>
